name: arfix
description: "Arfix - Customer Reward & Loyalty Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Architecture
  get: ^4.7.2
  get_storage: ^2.1.1

  # Networking
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # QR Code Scanner
  mobile_scanner: ^7.0.1

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  percent_indicator: ^4.2.3

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  permission_handler: ^11.4.0
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

